name: marketing-agent

# ステップ3: GA4データ取得 → 分析 → 戦略案 → 全媒体の原稿作成 → 配信チェックリスト作成 までを自動化する。
# 実投稿・配信は人が確認・承認した後に人が実行する(CLAUDE.mdの安全ルール参照)。

on:
  # 手動実行用(Actionsタブから "Run workflow" で実行確認できる)
  workflow_dispatch: {}

  # 週次実行の例: 毎週月曜 9:00 JST (UTC 0:00) に起動
  # 必要に応じて曜日・時刻を変更してください
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write
  id-token: write

jobs:
  run-ai-employee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch GA4 data
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          echo "$GA4_SERVICE_ACCOUNT_KEY_B64" | base64 -d > /tmp/ga4-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga4-key.json
          npm run fetch-ga4
        # GA4取得に失敗してもワークフロー全体は止めない
        # (analytics-agentが「データ未取得」として処理を続行する)
        continue-on-error: true

      - name: Remove GA4 credentials file
        if: always()
        run: rm -f /tmp/ga4-key.json

      - name: Run Claude Code (marketing agent)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CLAUDE.md の方針と、.claude/agents/ 配下の各サブエージェント設定に従って、
            以下の順序で今週分の処理を実行してください。

            1. analytics-agent の設定に従い、data/analytics/ 配下にある最新のGA4データ
               (YYYY-MM-DD-ga4.json)を確認し、data/reports/YYYY-MM-DD-analytics-summary.md
               を作成してください。
               - GA4データが見つからない場合は「データ未取得」と明記し、その他のSNSデータも
                 同様に「データ未取得」として処理を続けてください。

            2. strategy-agent の設定に従い、上記の分析サマリーを元に
               data/reports/YYYY-MM-DD-strategy.md を作成してください。

            3. content-writer-agent の設定に従い、上記の戦略案に基づいて原稿を作成してください。
               - まず「ブログ/Webサイト」向けの記事を
                 content/blog/YYYY-MM-DD-<タイトル概要>.md として1件作成する。
               - 続いて、そのブログ記事の内容を踏まえつつ、戦略案で指示された配分に従って
                 X / LinkedIn / Instagram / Facebook 向けの原稿を、それぞれ
                 content/<媒体>/YYYY-MM-DD-<内容概要>.md として作成する
                 (各媒体のトーン・文字数の目安は content-writer-agent.md を参照)。
               - WhatsApp Business向けの個別フォローメッセージは、現時点では送信対象の
                 リード情報が無いため作成不要。スキップしてよい。

            4. scheduler-agent の設定に従い、今回作成した全ての原稿(ブログ・X・LinkedIn・
               Instagram・Facebookの content/ 配下のファイル)を一覧化した
               data/reports/YYYY-MM-DD-publish-checklist.md を作成してください。
               - 自動投稿は行わず、あくまで「人が確認するためのチェックリスト」を
                 作成するところまでとしてください。

            日付(YYYY-MM-DD)は実行日の日付を使用してください。
          claude_args: |
            --allowedTools "Read,Write,Bash"

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ai-marketing-bot"
          git config user.email "ai-marketing-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/ content/ || true
          git diff --cached --quiet || git commit -m "chore: AI社員の実行結果を更新(分析・戦略・原稿・配信チェックリスト)"
          git push
