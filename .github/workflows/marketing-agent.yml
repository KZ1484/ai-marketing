name: marketing-agent

# ステップ1では「動作確認用の雛形」として配置します。
# 本番運用のスケジュール・プロンプト内容はステップ2で調整します。

on:
  # 手動実行用(Actionsタブから "Run workflow" で実行確認できる)
  workflow_dispatch: {}

  # 週次実行の例: 毎週月曜 9:00 JST (UTC 0:00) に起動
  # 必要に応じて曜日・時刻を変更してください
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write

jobs:
  run-ai-employee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code (marketing agent)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 動作確認用のシンプルな指示。
          # ステップ2で「analytics-agent → strategy-agent → content-writer-agent
          # → scheduler-agent」の順に実行する具体的な指示に置き換えます。
          direct_prompt: |
            CLAUDE.md の方針に従って、リポジトリの構成(.claude/agents/ 配下の
            各サブエージェント設定を含む)が正しく認識できるか確認し、
            実行結果を簡単なテキストで data/reports/setup-check.md に出力してください。

      - name: Commit results
        run: |
          git config user.name "ai-marketing-bot"
          git config user.email "ai-marketing-bot@users.noreply.github.com"
          git add data/ content/ || true
          git diff --cached --quiet || git commit -m "chore: AI社員の実行結果を更新"
          git push
